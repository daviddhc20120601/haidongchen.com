name: Deploy on Content Change

on:
  push:
    branches:
      - master
  # Allow manual triggering
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper deployment

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Align with Vercel's default Node version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (Vercel-compatible)
        run: npm run build

      # Deploy to Vercel. Set VERCEL_TOKEN and VERCEL_ORG_ID / VERCEL_PROJECT_ID
      # as repository secrets (see vercel.json + Vercel project settings).
      # Vercel's native Git integration usually handles deploys automatically,
      # this step is an explicit fallback for content-only pushes.
      - name: Deploy to Vercel
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel secrets not configured — skipping explicit deploy."
            echo "If you have linked the repo via the Vercel Git integration, the deploy already happened on push."
            exit 0
          fi
          npm i -g vercel@latest
          vercel --prod --yes --token="$VERCEL_TOKEN" --org="$VERCEL_ORG_ID" --project="$VERCEL_PROJECT_ID"

      # Notify DingTalk if configured (using curl instead of action)
      - name: Notify DingTalk
        if: success()
        env:
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
        run: |
          if [ -n "$DINGTALK_WEBHOOK_URL" ]; then
            # Prepare markdown message
            MSG="### 🎉 Vercel Deployment Successful\n\n**Repository:** ${{ github.repository }}\n**Branch:** ${{ github.ref_name }}\n**Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\n**Triggered By:** ${{ github.actor }}\n\nContent changes have been published to Vercel."

            # Send to DingTalk
            curl -X POST "$DINGTALK_WEBHOOK_URL" \
                 -H "Content-Type: application/json" \
                 -d "{\"msgtype\":\"markdown\",\"markdown\":{\"title\":\"Deployment Successful\",\"text\":\"$MSG\"}}"

            echo "DingTalk notification sent"
          else
            echo "DINGTALK_WEBHOOK_URL is not set, skipping notification"
          fi
        continue-on-error: true

      # Notify ntfy if configured
      - name: Notify ntfy
        if: success()
        env:
          NTFY_WEBHOOK_URL: ${{ secrets.NTFY_WEBHOOK_URL }}
        run: |
          if [ -n "$NTFY_WEBHOOK_URL" ]; then
            curl -H "Title: Website Deployment Successful" \
                 -H "Priority: default" \
                 -H "Tags: white_check_mark" \
                 -d "Content changes for ${{ github.repository }} have been published to Vercel." \
                 "$NTFY_WEBHOOK_URL"

            echo "ntfy notification sent"
          else
            echo "NTFY_WEBHOOK_URL is not set, skipping notification"
          fi
        continue-on-error: true

      - name: Notify on success
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "New content changes have been published."
          echo "Deployed to Vercel"
